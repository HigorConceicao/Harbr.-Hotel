<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#004080">
  <title>Trinkgeld HARBR – Login</title>
  <link rel="stylesheet" href="PaginaInicial.css" />
  <link rel="icon" type="image/png" href="favicon.png">

</head>
<body>

  <div class="login-container">
    <h2>Login</h2>

    <form id="loginForm">
      <label for="username">Benutzername:</label>
      <input type="text" id="username" required />

      <label for="password">Passwort:</label>
      <input type="password" id="password" required />

      <button type="submit">Einloggen</button>
    </form>

    <p id="loginMessage"></p>
  </div>

  <script>
    // Usuários do sistema com senha
    const users = {
      "Karina": { password: "KBH", code: "KBH" },
      "Zana": { password: "ZHH", code: "ZHH" },
      "Nick": { password: "NPS", code: "NPS" },
      "Simone": { password: "SBC", code: "SBC" },
      "Elisabeth": { password: "EBH", code: "EBH" },
      "Julian": { password: "JNH", code: "JNH" },
      "Deborah": { password: "DBA", code: "DBA" },
      "Higor": { password: "HCS", code: "HCS" },
      "Daniel": { password: "DMS", code: "DMS" },
      "Christian": { password: "CWH", code: "CWH" }
    };

    document.getElementById("loginForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const message = document.getElementById("loginMessage");

      // Verificar usuário e senha
      if (users[username] && users[username].password === password) {
        localStorage.setItem("loggedUser", username);
        localStorage.setItem("userCode", users[username].code);
        window.location.href = "Trinkgeld.html";
      } else {
        message.textContent = "Ungültiger Benutzername oder Passwort!";
        message.style.color = "red";
      }
    });
  </script>

</body>
</html>
